<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Listado-productos</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center" href="admin-index.html">
            <i class="bi bi-shield-lock-fill me-2 text-info"></i>
            <span>Admin Panel</span>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto fs-5">
              <li class="nav-item">
                <a class="nav-link" href="admin-index.html">Inicio</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="admin-listado-productos.html">Productos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="admin-listado-usuario.html">Usuarios</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="admin-listado-compras.html">Pedidos</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="container mt-5">
        <form
          class="container mt-5 shadow p-4 rounded bg-white"
          action="/admin/productos/agregar"
          method="POST"
        >
          <h1 class="mb-4 h2 text-center">Agregar Nuevo Producto</h1>
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre del Producto</label>
            <input
              type="text"
              class="form-control"
              id="nombre"
              name="nombre"
              required
            />
            <div id="errorNombre" class="form-text text-danger"></div>
          </div>
          <div class="mb-3">
            <label for="precio" class="form-label">Precio</label>
            <input
              type="number"
              step="0.01"
              class="form-control"
              id="precio"
              name="precio"
              required
            />
            <div id="errorPrecio" class="form-text text-danger"></div>
          </div>
          <div class="mb-3">
            <label for="stock" class="form-label">Stock</label>
            <input
              type="number"
              class="form-control"
              id="stock"
              name="stock"
              required
            />
            <div id="errorStock" class="form-text text-danger"></div>
          </div>
          <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción</label>
            <textarea
              class="form-control"
              id="descripcion"
              name="descripcion"
              rows="3"
            ></textarea>
            <div id="errorDescripcion" class="form-text text-danger"></div>
          </div>
          <div class="mb-3">
            <label for="categoriaObligatoria" class="form-label"
              >Categoría obligatoria</label
            >
            <select
              id="categoriaObligatoria"
              name="categoria"
              class="form-select"
              required
            >
              <option value="">Selecciona una categoría</option>
              <option value="telefono">Telefono</option>
              <option value="cargador">Cargador</option>
              <option value="funda">Funda</option>
              <option value="auriculares">Auriculares</option>
            </select>
            <div
              id="errorCategoriaObligatoria"
              class="form-text text-danger"
            ></div>
          </div>
          <div class="mb-3">
            <label for="categoriaOpcional" class="form-label"
              >Categorías opcionales</label
            >
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                value=""
                id="checkDefault"
              />
              <label class="form-check-label" for="checkDefault">
                acaVanLasCategoriasOpcionales</label
              >
            </div>
          </div>
          <div class="mb-3">
            <button
              type="button"
              class="btn btn-secondary w-100"
              id="btnImagenes"
            >
              Mostrar imagenes disponibles
            </button>
            <input type="hidden" id="imagen" name="imagen" />
            <div id="imagenesDisponibles" class="mt-3 row"></div>

            <div id="errorImagen" class="form-text text-danger"></div>
          </div>

          <button
            type="button"
            class="btn btn-primary w-100"
            id="btnAgregarProducto"
          >
            Agregar Producto
          </button>
          <div id="mensajeError" class="mt-3 text-danger"></div>
        </form>
      </section>
      <section class="container mt-5">
        <div class="shadow p-4 rounded bg-white">
          <h1 class="mb-4 h2 text-center">
            Creacion de categorias personalizadas
          </h1>
          <form id="formCategoriaPersonalizada">
            <div class="mb-3">
              <label for="nuevaCategoria" class="form-label"
                >Nombre de la nueva categoría</label
              >
              <input
                type="text"
                class="form-control"
                id="nuevaCategoria"
                name="nuevaCategoria"
              />
              <div id="errorNuevaCategoria" class="form-text"></div>
            </div>
            <button
              type="button"
              class="btn btn-success"
              id="btnAgregarCategoria"
            >
              Agregar Categoría
            </button>
            <div id="mensajeCategoriaOpcional" class="mt-3 text-danger"></div>
            <div class="mt-3">
              <ul class="list-group" id="listaCategoria"></ul>
            </div>
          </form>
        </div>
      </section>

      <section class="container mt-5">
        <div class="shadow p-4 rounded bg-white">
          <h1 class="mb-4 h2 text-center">Listado de Productos</h1>

          <table class="table table-striped">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaProductos"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/js-productos.js"></script>
    <script src="../js/js-categoria-productos.js"></script>
  </body>
</html>
