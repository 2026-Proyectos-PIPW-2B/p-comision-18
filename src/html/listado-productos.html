<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda DCICCELL</title>
    <link rel="stylesheet" href="../css/estilos.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-secondary-subtle">
    <header class="mb-4 shadow-sm bg-info-subtle rounded">
      <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container px-4">
          <a class="navbar-brand h2" href="index.html">
          <a class="navbar-brand h2" href="index.html">
            <img
              src="../img/dciccell.png"
              src="../img/dciccell.png"
              alt="imagen logo"
              class="img-fluid"
              style="max-height: 100px"
          /></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto fs-4">
              <li class="nav-item">
                <a class="nav-link" href="listado-productos.html">Tienda</a>
              </li>
              <li class="nav-item">
                <button
                  type="button"
                  class="nav-link"
                  data-bs-toggle="offcanvas"
                  data-bs-target="#carritoCompras"
                  aria-controls="carritoCompras"
                >
                  Carrito
                </button>
              </li>
              <li class="nav-item">
                <button class="nav-link" id="botonPerfil" href="perfil-usuario.html">Perfil</button>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <div class="offcanvas offcanvas-end" id="carritoCompras">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Carrito de compras.</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
        ></button>
      </div>
      <div class="offcanvas-body d-flex flex-column justify-content-between">
        <div
          class="row px-2 overflow-y-auto flex-grow-1"
          id="productosCarrito"
        ></div>
        <div class="p-2 border-top">
          <button class="col-12 btn btn-primary" id="compraCarrito">
            Confirmar compra
          </button>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalCompraExitosa">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Compra realizada!</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p>
              Tu compra ya fue confirmada. En los proximos dias llegara a tu
              casa.
            </p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cerrar
            </button>
            <a
              type="button"
              class="btn btn-primary"
              href="historial-compras.html"
              >Ver tu compra</a
            >
          </div>
        </div>
      </div>
    </div>

    <main>
      <section class="mb-5">
        <div class="row mt-4 justify-content-end">
          <div class="col-lg-2">
            <button
              type="button"
              class="btn btn-outline-primary btn-lg"
              data-bs-toggle="offcanvas"
              data-bs-target="#formularioFiltros"
              aria-controls="formularioFiltros"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-funnel"
                viewBox="0 0 16 16"
              >
                <path
                  d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5zm1 .5v1.308l4.372 4.858A.5.5 0 0 1 7 8.5v5.306l2-.666V8.5a.5.5 0 0 1 .128-.334L13.5 3.308V2z"
                />
              </svg>
              Filtros
            </button>

            <div
              class="offcanvas offcanvas-start"
              tabindex="-1"
              id="formularioFiltros"
              aria-labelledby="formularioFiltrosLabel"
            >
              <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="formularioFiltrosLabel">
                  Filtros
                </h5>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="offcanvas"
                  aria-label="Close"
                ></button>
              </div>
              <div class="offcanvas-body">
                <div>
                  <form class="bg-secondary-subtle rounded p-2">
                    <div
                      class="container border-2 border-secondary border-bottom pb-3"
                    >
                      <label for="inputOrdenar">Ordenar por:</label><br />
                      <select
                        name="ordenar"
                        id="inputOrdenar"
                        class="form-select"
                      >
                        <option value="mayorPrecio">Mayor Precio</option>
                        <option value="menorPrecio">Menor Precio</option>
                        <option value="vacio" selected disabled>
                          Seleccione una opcion...
                        </option>
                      </select>
                    </div>
                    <div
                      class="container border-2 border-secondary border-bottom py-3"
                    >
                      <label for="rangoPrecioMax">Precio:</label><br />
                      <div
                        class="d-flex align-items-center gap-2 justify-content-evenly"
                      >
                        <input
                          type="number"
                          name="precioMinino"
                          id="inputPrecioMinimo"
                          placeholder="0$"
                          class="form-control-sm col-5 text-center"
                        />
                        <span> a </span>
                        <input
                          type="number"
                          name="precioMaximo"
                          id="inputPrecioMaximo"
                          placeholder="(aca ponemos el precio mas caro)"
                          class="form-control-sm col-5 text-center"
                        />
                      </div>
                    </div>
                    <div
                      class="container border-2 border-secondary border-bottom py-3"
                    >
                      <div class="form-check">
                        <input
                          type="radio"
                          class="form-check-input"
                          name="radioFiltro"
                          id="inputCelulares"
                        />
                        <label for="inputCelulares" class="formm-check-label"
                          >Celulares</label
                        >
                      </div>
                      <div class="form-check">
                        <input
                          type="radio"
                          class="form-check-input"
                          name="radioFiltro"
                          id="inputAuriculares"
                        />
                        <label for="inputAuriculares" class="formm-check-label"
                          >Auriculares</label
                        >
                      </div>
                      <div class="form-check">
                        <input
                          type="radio"
                          class="form-check-input"
                          name="radioFiltro"
                          id="inputCargadores"
                        />
                        <label for="inputCargadores" class="formm-check-label"
                          >Cargadores</label
                        >
                      </div>
                      <div class="form-check">
                        <input
                          type="radio"
                          class="form-check-input"
                          name="radioFiltro"
                          id="inputFundas"
                        />
                        <label for="inputFundas" class="formm-check-label"
                          >Fundas</label
                        >
                      </div>
                    </div>
                    <div class="d-flex justify-content-center mt-2">
                      <div class="btn btn-primary">Aplicar Filtros</div>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="row px-5 py-4 mx-4 row-gap-4" id="listado-productos"></div>
      </section>
    </main>

    <footer id="footer" class="bg-dark text-white py-4 mt-auto">
      <div class="container">
        <div class="row text-center text-md-start">
          <div class="col-md-4 mb-3">
            <h5>DCICCELL</h5>
            <p>La tienda de celulares mas confiable.</p>
          </div>
          <div class="col-md-4 mb-3">
            <h5>Links</h5>
            <ul class="list-unstyled">
              <li>
                <a href="index.html" class="text-white text-decoration-none"
                  >Inicio</a
                >
              </li>
              <li>
                <a
                  href="listado-productos.html"
                  class="text-white text-decoration-none"
                  >Tienda</a
                >
              </li>
              <li>
                <a
                  href="perfil-usuario.html"
                  class="text-white text-decoration-none"
                  >Perfil</a
                >
              </li>
            </ul>
          </div>
          <div class="col-md-4">
            <h5>Redes Sociales</h5>
            <div
              class="d-flex gap-3 justify-content-center justify-content-md-start"
            >
              <i class="bi bi-instagram fs-4"></i>
              <i class="bi bi-facebook fs-4"></i>
              <i class="bi bi-twitter-x fs-4"></i>
            </div>
          </div>
        </div>
        <hr />
        <p class="text-center mb-0">© 2026 DCICCELL</p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/js-tienda.js"></script>
    <script src="../js/js-tienda-carritoDeCompras.js"></script>
  </body>
</html>
