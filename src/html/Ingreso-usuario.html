<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingreso de Usuario</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="d-flex flex-column min-vh-100 bg-secondary-subtle">
    <header class="mb-4 shadow-sm bg-info-subtle rounded">
      <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container px-4">
          <a class="navbar-brand h2" href="index.html">
            <img
              src="../img/dciccell.png"
              alt="imagen logo"
              class="img-fluid"
              style="max-height: 100px"
          /></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto fs-4">
              <li class="nav-item">
                <a class="nav-link" href="listado-productos.html">Tienda</a>
              </li>
              <li class="nav-item">
                <button class="nav-link" id="botonPerfil" href="perfil-usuario.html"></button>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container mb-5 flex-grow-1">
      <div class="container mt-5 shadow p-4 rounded bg-light">
        <h1 class="mb-4 h1 text-center">Ingreso de Usuario</h1>

        <form id="formularioIngreso" class="needs-validation" novalidate>
          <div class="mb-3">
            <label for="inputUsername" class="form-label"
              >Nombre de Usuario</label
            >
            <input
              type="text"
              class="form-control"
              id="inputUsername"
              name="nombreUsuario"
              required
            />
            <div class="invalid-feedback" id="divErrorUsername"></div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input
              type="password"
              class="form-control"
              id="inputPassword"
              name="password"
              required
            />
            <div class="invalid-feedback" id="divErrorPassword"></div>
          </div>
          <div class="mb-3">
            Aún no tienes una cuenta?
            <a href="registro-usuario.html">Registrate aquí</a>
          </div>
          <div class="mb-3">
            <a href="listado-productos.html">Ingrese a la tienda sin usuario</a>
          </div>
          <button type="submit" class="btn btn-primary">Ingresar</button>
          <div class="mt-2" id="ingresoValido"></div>
        </form>
      </div>
    </main>
    <footer id="footer" class="bg-dark text-white py-4 mt-auto">
      <div class="container">
        <div class="row text-center text-md-start">
          <div class="col-md-4 mb-3">
            <h5>DCICCELL</h5>

            <p>La tienda de celulares mas confiable.</p>
          </div>

          <div class="col-md-4 mb-3">
            <h5>Links</h5>

            <ul class="list-unstyled">
              <li>
                <a
                  href="index.html"
                  class="text-white text-decoration-none"
                  >Inicio</a
                >
              </li>
              <li>
                <a href="listado-productos.html" class="text-white text-decoration-none"
                  >Tienda</a
                >
              </li>
              <li>
                <a href="perfil-usuario.html" class="text-white text-decoration-none">Perfil</a>
              </li>
            </ul>
          </div>

          <div class="col-md-4">
            <h5>Redes Sociales</h5>

            <div
              class="d-flex gap-3 justify-content-center justify-content-md-start"
            >
              <i class="bi bi-instagram fs-4"></i>
              <i class="bi bi-facebook fs-4"></i>
              <i class="bi bi-twitter-x fs-4"></i>
            </div>
          </div>
        </div>

        <hr />

        <p class="text-center mb-0">© 2026 DCICCELL</p>
      </div>
    </footer>

    <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/js-validacion-ingreso.js"></script>
  </body>
</html>
