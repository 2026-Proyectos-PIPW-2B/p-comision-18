<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listado de Pedidos - Admin Panel</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center" href="admin-index.html">
            <i class="bi bi-shield-lock-fill me-2 text-info"></i>
            <span>Admin Panel</span>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto fs-5">
              <li class="nav-item">
                <a class="nav-link" href="admin-listado-productos.html">Productos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="admin-listado-usuario.html">Usuarios</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="admin-listado-compras.html">Pedidos</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container my-5 flex-grow-1">
      <div class="container mt-5 shadow p-4 rounded bg-white">
        <h1 class="mb-4 h1 text-center">Historial de Compras</h1>
        <div
          class="row g-3 mb-4 justify-content-end bg-light p-3 rounded mx-0 shadow-sm"
        >
          <div class="col-md-4 col-sm-6">
            <label
              for="filtrarUsuarios"
              class="form-label small fw-bold text-secondary"
            >
              <i class="bi bi-person"></i> Filtrar por nombre de usuario</label>
            <input type="text" name="usuarios" class="form-control" id="filtrarUsuarios" placeholder="Todos los usuarios">
          </div>
          <div class="col-md-4 col-sm-6">
            <label
              for="ordenarMonto"
              class="form-label small fw-bold text-secondary"
            >
              <i class="bi bi-currency-dollar"></i> Ordenar por Monto
            </label>
            <select
              class="form-select form-select-sm border-secondary-subtle"
              id="ordenarMonto"
            >
              <option value="sin-ordenar" selected>
                Sin ordenar por monto
              </option>
              <option value="monto-asc">Menor a Mayor monto</option>
              <option value="monto-desc">Mayor a Menor monto</option>
            </select>
          </div>
          <div class="col-md-4 col-sm-6">
            <label
              for="ordenarPedidos"
              class="form-label small fw-bold text-secondary"
            >
              <i class="bi bi-sort-numeric-down"></i> Orden de Pedidos
            </label>
            <select
              class="form-select form-select-sm border-secondary-subtle"
              id="ordenarPedidos"
            >
              <option value="recientes" selected>Más recientes primero</option>
              <option value="antiguos">Más antiguos primero</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="table-responsive">
            <table class="table table-striped table-hover border align-middle">
              <thead class="table-dark">
                <th>Fecha</th>
                <th>ID de Compra</th>
                <th>Cantidad de elementos</th>
                <th>Total</th>
                <th>Usuario</th>
                <th>Detalle</th>
              </thead>
              <tbody id="tablaBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center">
        <p class="mb-0">&copy; 2026 DCICCELL - Panel de Administración. Todos los derechos reservados.</p>
      </div>
    </footer>

    <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/js-historialCompras.js"></script>
  </body>
</html>
