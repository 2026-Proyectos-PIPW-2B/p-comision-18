<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historial de Compras</title>
    <link rel="stylesheet" href="../css/estilos.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="d-flex flex-column fondo">
    <header
      class="mb-4 shadow border-bottom border-secondary border-opacity-25 sticky-top bg-dark bg-opacity-75"
      style="backdrop-filter: blur(10px)"
    >
      <nav class="navbar navbar-expand-lg navbar-dark py-2">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center" href="index.html">
            <img
              src="../img/dciccell.png"
              alt="imagen logo"
              class="img-fluid"
              style="max-height: 80px"
            />
          </a>
          <button
            class="navbar-toggler border-secondary"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto gap-2">
              <li class="nav-item">
                <a
                  class="nav-link fw-semibold text-light-50"
                  href="listado-productos.html"
                  >Tienda</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link fw-semibold text-info active"
                  id="botonPerfil"
                  href="perfil-usuario.html"
                  >Perfil</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container mb-5 flex-grow-1">
      <div class="container mt-5 shadow p-4 rounded bg-white">
        <h1 class="mb-4 h1 text-center">Historial de Compras</h1>

        <div
          class="row g-3 mb-4 justify-content-end bg-light p-3 rounded mx-0 shadow-sm"
        >
          <div class="col-md-4 col-sm-6">
            <label
              for="ordenarMonto"
              class="form-label small fw-bold text-secondary"
            >
              <i class="bi bi-currency-dollar"></i> Ordenar por Monto
            </label>
            <select
              class="form-select form-select-sm border-secondary-subtle"
              id="ordenarMonto"
            >
              <option value="sin-ordenar" selected>
                Sin ordenar por monto
              </option>
              <option value="monto-asc">Menor a Mayor monto</option>
              <option value="monto-desc">Mayor a Menor monto</option>
            </select>
          </div>
          <div class="col-md-4 col-sm-6">
            <label
              for="ordenarPedidos"
              class="form-label small fw-bold text-secondary"
            >
              <i class="bi bi-sort-numeric-down"></i> Orden de Pedidos
            </label>
            <select
              class="form-select form-select-sm border-secondary-subtle"
              id="ordenarPedidos"
            >
              <option value="recientes" selected>Más recientes primero</option>
              <option value="antiguos">Más antiguos primero</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-12 mb-4">
            <div class="table-responsive">
              <table
                class="table table-striped table-hover border align-middle"
              >
                <thead class="table-dark">
                  <tr>
                    <th scope="col" style="width: 20%">Fecha</th>
                    <th scope="col" style="width: 20%">ID de compra</th>
                    <th scope="col" style="width: 20%">Cantidad</th>
                    <th scope="col" style="width: 20%">Total</th>
                    <th scope="col" style="width: 20%">Acción</th>
                  </tr>
                </thead>
                <tbody id="tablaBody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="mt-3">
          <a href="perfil-usuario.html" class="btn btn-secondary shadow-sm">
            <i class="bi bi-arrow-left-short"></i> Volver a Mi Perfil
          </a>
        </div>
      </div>
    </main>

    <footer id="footer" class="bg-dark text-white py-4 mt-auto">
      <div class="container">
        <div class="row text-center text-md-start">
          <div class="col-md-4 mb-3">
            <h5>DCICCELL</h5>
            <p>La tienda de celulares mas confiable.</p>
          </div>
          <div class="col-md-4 mb-3">
            <h5>Links</h5>
            <ul class="list-unstyled">
              <li>
                <a href="index.html" class="text-white text-decoration-none"
                  >Inicio</a
                >
              </li>
              <li>
                <a
                  href="listado-productos.html"
                  class="text-white text-decoration-none"
                  >Tienda</a
                >
              </li>
              <li>
                <a
                  href="perfil-usuario.html"
                  class="text-white text-decoration-none"
                  >Perfil</a
                >
              </li>
            </ul>
          </div>
          <div class="col-md-4">
            <h5>Redes Sociales</h5>
            <div
              class="d-flex gap-3 justify-content-center justify-content-md-start"
            >
              <i class="bi bi-instagram fs-4"></i>
              <i class="bi bi-facebook fs-4"></i>
              <i class="bi bi-twitter-x fs-4"></i>
            </div>
          </div>
        </div>
        <hr />
        <p class="text-center mb-0">© 2026 DCICCELL</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/js-historialCompras.js"></script>
  </body>
</html>
