<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Usuario</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="d-flex flex-column min-vh-100 bg-secondary-subtle">
    <header class="mb-4 shadow-sm bg-info-subtle rounded">
      <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container px-4">
          <a class="navbar-brand h2" href="index.html">
            <img
              src="../img/dciccell.png"
              alt="imagen logo"
              class="img-fluid"
              style="max-height: 100px"
          /></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto fs-4">
              <li class="nav-item">
                <a class="nav-link" href="listado-productos.html">Tienda</a>
              </li>
              <li class="nav-item">
                <button class="nav-link" id="botonPerfil"></button>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container mb-5 flex-grow-1">
      <div class="row">
        <div class="col-12 col-md-8 col-lg-6 mx-auto shadow p-4 rounded bg-white mt-4">
          <h1 class="mb-4 h2 text-center">Registro de Usuario</h1>
          <form id="formularioRegistro" class="needs-validation" novalidate>
            <div class="mb-3">
              <label for="inputNombre" class="form-label">Nombre</label>
              <input type="text" class="form-control" id="inputNombre" name="nombre" placeholder="Ingrese su nombre..." required>
              <div class="invalid-feedback" id="errorNombre"></div>
            </div>
            <div class="mb-3">
              <label for="inputApellido" class="form-label">Apellido</label>
              <input type="text" class="form-control" id="inputApellido" name="apellido" placeholder="Ingrese su apellido..." required>
              <div class="invalid-feedback" id="errorApellido"></div>
            </div>

            <div class="mb-3">
              <label for="inputTelefono" class="form-label">Telefono</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                <input type="tel" class="form-control" id="inputTelefono" name="telefono" placeholder="EJ.: 2911234567" required>
                <div class="invalid-feedback" id="errorTelefono"></div>
              </div>
            </div>

            <div class="mb-3">
              <label for="inputDireccion" class="form-label">Telefono</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-house"></i></span>
                <input type="text" class="form-control" id="inputDireccion" name="direccion" placeholder="EJ.: Calle 123, Ciudad" required>
                <div class="invalid-feedback" id="errorDireccion"></div>
              </div>
            </div>

            <div class="mb-3">
              <label for="inputCorreo" class="form-label">Correo Electrónico</label>
              <div class="input-group">
                <span class="input-group-text" id="addon-wrapping">@</span>
                <input type="email" class="form-control" id="inputCorreo" name="email" placeholder="EJ.: tunombre@email.com" required>
                <div class="invalid-feedback" id="errorCorreo"></div>
              </div>
            </div>

            <div class="mb-3">
              <label for="inputPassword" class="form-label">Contraseña</label>
              <input type="password" class="form-control" id="inputPassword" name="password" required>
            </div>

            <div class="mb-3">
              <label for="inputConfirmPassword" class="form-label">Confirmar Contraseña</label>
              <input type="password" class="form-control" id="inputConfirmPassword" name="confirmPassword" required>
              <div class="invalid-feedback" id="errorPassword"></div>
            </div>
            
            <div>
              La contraseña debe tener:
              <ul>
                <li id="password1" class="text-secondary">Al menos 10 caracteres</li>
                <li id="password2" class="text-secondary">Al menos una mayúscula</li>
                <li id="password3" class="text-secondary">Al menos un carácter especial</li>
                <li id="password4" class="text-secondary">Al menos un número</li>
              </ul>
            </div>

            <div class="d-grid gap-2 mt-4">
              <button type="submit" class="btn btn-primary" >Registrar</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer id="footer" class="bg-dark text-white py-4 mt-auto">
      <div class="container">
        <div class="row text-center text-md-start">
          <div class="col-md-4 mb-3">
            <h5>DCICCELL</h5>
            <p class="text-secondary">La tienda de celulares más confiable.</p>
          </div>

          <div class="col-md-4 mb-3">
            <h5>Links</h5>
            <ul class="list-unstyled">
              <li>
                <a
                  href="index.html"
                  class="text-white text-decoration-none"
                  >Inicio</a
                >
              </li>
              <li>
                <a href="listado-productos.html" class="text-white text-decoration-none"
                  >Tienda</a
                >
              </li>
              <li>
                <a href="perfil-usuario.html" class="text-white text-decoration-none">Perfil</a>
              </li>
            </ul>
          </div>

          <div class="col-md-4">
            <h5>Redes Sociales</h5>
            <div
              class="d-flex gap-3 justify-content-center justify-content-md-start"
            >
              <i class="bi bi-instagram fs-4" style="cursor: pointer"></i>
              <i class="bi bi-facebook fs-4" style="cursor: pointer"></i>
              <i class="bi bi-twitter-x fs-4" style="cursor: pointer"></i>
            </div>
          </div>
        </div>

        <hr class="bg-secondary" />

        <p class="text-center mb-0 text-secondary">© 2026 DCICCELL</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/js-registro.js"></script>
    <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
  </body>
</html>
